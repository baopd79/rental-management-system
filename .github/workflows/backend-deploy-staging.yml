name: Backend Deploy — Staging

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend-deploy-staging.yml'
  workflow_dispatch:  # Allow manual trigger for hotfix

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # Don't cancel mid-deploy

jobs:
  build-and-push:
    name: Build + push image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="staging-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}/backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy to staging VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            set -e
            cd /opt/rms/staging

            # Login to GHCR on VPS
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update image tag in .env
            sed -i "s|^BACKEND_IMAGE_TAG=.*|BACKEND_IMAGE_TAG=${IMAGE_TAG}|" .env

            # Pull new image
            docker compose pull backend

            # Rolling update (Alembic runs on container start)
            docker compose up -d backend

            # Cleanup old images (keep last 3 staging builds)
            docker image prune -f --filter "label=org.opencontainers.image.source=${{ github.repositoryUrl }}" || true
          EOF

      - name: Wait for service to be healthy
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.rms-app.vn/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 3s..."
            sleep 3
          done
          echo "Health check failed after 90s"
          exit 1

      - name: Smoke test key endpoints
        run: |
          curl -f https://staging.rms-app.vn/health | grep -q '"status":"ok"'
          curl -f -s -o /dev/null -w "%{http_code}" https://staging.rms-app.vn/docs | grep -q "200"
          echo "Smoke tests passed"

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"🔴 Staging deploy FAILED for commit ${{ github.sha }}\"}" \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          fi
